name: CI

on:
  push:
    branches: [main, developer]
  pull_request:
    branches: [main, developer]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Lint + build + tests unitarios (sin infraestructura)
  # ─────────────────────────────────────────────
  build-and-unit:
    name: Lint · Build · Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test -- --ci

  # ─────────────────────────────────────────────
  # Tests E2E contra Postgres + Redis reales
  # ─────────────────────────────────────────────
  e2e:
    name: E2E (Postgres + Redis)
    runs-on: ubuntu-latest
    needs: build-and-unit
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: web3
          # Credencial efímera y única por ejecución de CI (sin literal estático en el repo).
          POSTGRES_PASSWORD: ci_${{ github.run_id }}
          POSTGRES_DB: zentto_web3
        ports:
          - 5544:5432
        options: >-
          --health-cmd "pg_isready -U web3 -d zentto_web3"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6399:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5544
      DB_USER: web3
      DB_PASSWORD: ci_${{ github.run_id }}
      DB_NAME: zentto_web3
      DB_SYNCHRONIZE: 'true'
      REDIS_HOST: localhost
      REDIS_PORT: 6399
      CHAIN_DIFFICULTY: '2'
      MINING_REWARD: '50'
      # Secretos efímeros por ejecución (solo para los tests; no son de producción).
      JWT_SECRET: ci-e2e-access-${{ github.run_id }}-0123456789abcdef0123456789abcdef
      JWT_REFRESH_SECRET: ci-e2e-refresh-${{ github.run_id }}-0123456789abcdef0123456789abcdef
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: E2E tests
        run: npm run test:e2e

  # ─────────────────────────────────────────────
  # Verifica que la imagen Docker se construye
  # ─────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: build-and-unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: zentto-web3:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
